<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #1f3b2d; }
      .card { fill: #ffffff; stroke: #d9e7df; stroke-width: 2; rx: 16; }
      .h { font: 700 22px Arial, sans-serif; fill: #1b4d36; }
      .t { font: 400 16px Arial, sans-serif; fill: #3a4a42; }
      .chip { fill: #e9f4ee; stroke: #9dc6b1; stroke-width: 1.5; rx: 10; }
      .chipT { font: 600 14px Arial, sans-serif; fill: #26543e; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f7faf8"/>
  <text x="70" y="70" class="title">Member Quick Navigation Map</text>

  <rect x="70" y="120" width="520" height="180" class="card"/>
  <text x="100" y="165" class="h">Members Page</text>
  <text x="100" y="198" class="t">• Sign Up / Log In</text>
  <text x="100" y="226" class="t">• Access member resources</text>
  <text x="100" y="254" class="t">• Open community calendar</text>

  <rect x="610" y="120" width="520" height="180" class="card"/>
  <text x="640" y="165" class="h">Directory Page</text>
  <text x="640" y="198" class="t">• Search neighbors</text>
  <text x="640" y="226" class="t">• Edit My Profile</text>
  <text x="640" y="254" class="t">• Manage privacy and publish status</text>

  <rect x="70" y="330" width="520" height="180" class="card"/>
  <text x="100" y="375" class="h">Events Calendar</text>
  <text x="100" y="408" class="t">• View upcoming events</text>
  <text x="100" y="436" class="t">• Add and manage your own events</text>
  <text x="100" y="464" class="t">• See event details by day</text>

  <rect x="610" y="330" width="520" height="180" class="card"/>
  <text x="640" y="375" class="h">SMS Preferences</text>
  <text x="640" y="408" class="t">Path: Directory → My Profile → Privacy &amp; Publish</text>
  <text x="640" y="436" class="t">• Opt Out of SMS</text>
  <text x="640" y="464" class="t">• Opt Back In (if previously opted out)</text>

  <rect x="70" y="545" width="1060" height="150" class="card"/>
  <text x="100" y="590" class="h">Tips</text>
  <rect x="100" y="612" width="220" height="34" class="chip"/><text x="118" y="635" class="chipT">Keep phone/email updated</text>
  <rect x="340" y="612" width="260" height="34" class="chip"/><text x="358" y="635" class="chipT">Use strong password (8+ chars)</text>
  <rect x="620" y="612" width="220" height="34" class="chip"/><text x="638" y="635" class="chipT">Review privacy toggles</text>
  <rect x="860" y="612" width="240" height="34" class="chip"/><text x="878" y="635" class="chipT">Log out on shared devices</text>
</svg>