<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #1f3b2d; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #4b5d53; }
      .step { fill: #ffffff; stroke: #2d6a4f; stroke-width: 2; rx: 18; }
      .stepText { font: 600 20px Arial, sans-serif; fill: #173f2c; }
      .detail { font: 400 16px Arial, sans-serif; fill: #2f3d35; }
      .arrow { stroke: #2d6a4f; stroke-width: 3; marker-end: url(#arrow); fill: none; }
      .badge { fill: #f4e7c6; stroke: #d6b56a; stroke-width: 1.5; rx: 10; }
      .badgeText { font: 700 18px Arial, sans-serif; fill: #7b5a1c; }
      .note { fill: #eef6f1; stroke: #a6c8b6; stroke-width: 1.5; rx: 12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d6a4f" />
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f8fbf9"/>
  <text x="70" y="70" class="title">Member Onboarding Flow</text>
  <text x="70" y="104" class="subtitle">Glenridge Community HOA website</text>

  <rect x="70" y="150" width="250" height="140" class="step"/>
  <text x="95" y="190" class="stepText">1) Open Members Page</text>
  <text x="95" y="220" class="detail">Go to members.html</text>
  <text x="95" y="246" class="detail">Click “Sign Up”</text>

  <rect x="360" y="150" width="250" height="140" class="step"/>
  <text x="385" y="190" class="stepText">2) Create Account</text>
  <text x="385" y="220" class="detail">Enter resident details</text>
  <text x="385" y="246" class="detail">Submit signup form</text>

  <rect x="650" y="150" width="250" height="140" class="step"/>
  <text x="675" y="190" class="stepText">3) Await Approval</text>
  <text x="675" y="220" class="detail">Admin reviews request</text>
  <text x="675" y="246" class="detail">Email sent after decision</text>

  <rect x="940" y="150" width="190" height="140" class="step"/>
  <text x="962" y="190" class="stepText">4) Log In</text>
  <text x="962" y="220" class="detail">Use approved</text>
  <text x="962" y="246" class="detail">member account</text>

  <path d="M320 220 L350 220" class="arrow"/>
  <path d="M610 220 L640 220" class="arrow"/>
  <path d="M900 220 L930 220" class="arrow"/>

  <rect x="620" y="320" width="310" height="70" class="badge"/>
  <text x="650" y="364" class="badgeText">Typical approval time: ~3 business days</text>

  <rect x="70" y="430" width="1060" height="240" class="note"/>
  <text x="100" y="475" class="stepText">After approval, member should:</text>
  <text x="120" y="510" class="detail">• Open “My Profile” and complete directory details (phone, family, photos, privacy choices).</text>
  <text x="120" y="540" class="detail">• Use “Events” to view/add community events.</text>
  <text x="120" y="570" class="detail">• Control text-message preferences from Profile &gt; Privacy &amp; Publish &gt; Text Message Preferences.</text>
  <text x="120" y="600" class="detail">• Opt out anytime from profile or from the SMS unsubscribe link received in texts.</text>
  <text x="120" y="630" class="detail">• Contact admin@glenridgecommunity.com if approval takes longer than expected.</text>
</svg>