<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #2a213f; }
      .box { fill: #ffffff; stroke: #6b5ca5; stroke-width: 2; rx: 16; }
      .h { font: 700 21px Arial, sans-serif; fill: #372a5b; }
      .t { font: 400 16px Arial, sans-serif; fill: #443f52; }
      .arrow { stroke: #6b5ca5; stroke-width: 3; marker-end: url(#arr); fill: none; }
      .warn { fill: #fff4e8; stroke: #e5b980; stroke-width: 1.5; rx: 12; }
      .warnT { font: 600 15px Arial, sans-serif; fill: #6e4d21; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b5ca5" />
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fbfaff"/>
  <text x="70" y="70" class="title">Admin Approval Workflow</text>

  <rect x="80" y="140" width="240" height="130" class="box"/>
  <text x="105" y="180" class="h">1) Admin Login</text>
  <text x="105" y="210" class="t">Go to admin.html</text>
  <text x="105" y="236" class="t">Enter admin credentials</text>

  <rect x="360" y="140" width="240" height="130" class="box"/>
  <text x="385" y="180" class="h">2) Open Pending</text>
  <text x="385" y="210" class="t">Select “Pending Approval”</text>
  <text x="385" y="236" class="t">Review new applicants</text>

  <rect x="640" y="140" width="240" height="130" class="box"/>
  <text x="665" y="180" class="h">3) Verify Resident</text>
  <text x="665" y="210" class="t">Check name/address</text>
  <text x="665" y="236" class="t">Confirm eligibility</text>

  <rect x="920" y="140" width="200" height="130" class="box"/>
  <text x="945" y="180" class="h">4) Decide</text>
  <text x="945" y="210" class="t">Approve or Deny</text>
  <text x="945" y="236" class="t">System emails user</text>

  <path d="M320 205 L350 205" class="arrow"/>
  <path d="M600 205 L630 205" class="arrow"/>
  <path d="M880 205 L910 205" class="arrow"/>

  <rect x="80" y="320" width="1040" height="360" class="warn"/>
  <text x="110" y="365" class="h">Admin Best Practices (Step-by-step)</text>
  <text x="130" y="400" class="warnT">1. Approve/deny daily so member wait times stay near ~3 business days.</text>
  <text x="130" y="432" class="warnT">2. Use notes outside the app for edge cases (duplicate emails, residency questions).</text>
  <text x="130" y="464" class="warnT">3. After approvals, click “Sync Residents” in Pool Management to refresh pool entries.</text>
  <text x="130" y="496" class="warnT">4. Re-check “Approved” tab to confirm status moved correctly.</text>
  <text x="130" y="528" class="warnT">5. Use Delete only for incorrect/spam entries (irreversible action).</text>
  <text x="130" y="560" class="warnT">6. Keep admin credentials private; log out after each session.</text>
  <text x="130" y="592" class="warnT">7. If email is down, approvals still work; notification messages are logged to server console.</text>
</svg>